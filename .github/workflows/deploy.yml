name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn build

      # Split dist into cdn-assets and mister-files
      - name: Prepare artifacts
        run: |
          mkdir -p cdn-assets mister-files
          cp -r dist/assets cdn-assets/
          rsync -a --exclude='assets/' dist/ mister-files/

      # Deploy CDN assets to gh-pages branch (jsDelivr source)
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cdn-assets
          publish_branch: gh-pages
          force_orphan: true

      # Purge jsDelivr cache for updated assets
      - name: Purge jsDelivr cache
        run: |
          curl -sf "https://purge.jsdelivr.net/gh/VadimOsovsky/vados-mister-remote@gh-pages/assets/index.js" || true
          curl -sf "https://purge.jsdelivr.net/gh/VadimOsovsky/vados-mister-remote@gh-pages/assets/index.css" || true

      # Upload MiSTer files as downloadable artifact
      - name: Upload MiSTer files
        uses: actions/upload-artifact@v4
        with:
          name: mister-remote
          path: mister-files/
          retention-days: 90
